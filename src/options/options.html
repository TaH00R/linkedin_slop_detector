<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-SLOP Settings</title>
</head>
<body>

<h2>Settings</h2>

<label>
    Sensitivity
</label>

<input
    type="range"
    min="0"
    max="100"
    id="sensitivity"
    title="Sensitivity"
    aria-label="Sensitivity"
/>

<br><br>

<label>
    <input
        type="checkbox"
        id="showReasons"
        title="Show Reasons"
        aria-label="Show Reasons"
    />
    Show Reasons
</label>

<br><br>

<button id="saveBtn">
    Save
</button>

<script src="options.js" type="module"></script>

</body>
</html>
